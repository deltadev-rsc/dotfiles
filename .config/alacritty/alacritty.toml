general.import = [
    "~/.config/alacritty/catppuccin-mocha.toml"
]

[colors.vi_mode_cursor]
text = "#1e1e2e"
cursor = "#b4befe"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.footer_bar]
foreground = "#1e1e2e"
background = "#a6adc8"

[font]
size = 11.4

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[window.dimensions]
columns = 82
lines = 26

[window.padding]
x = 4
y = 4

[env]
TERM = "xterm-256color"

[window]
decorations = "Buttonless"
opacity = 0.939
blur = true

[keyboard]

